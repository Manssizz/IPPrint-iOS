name: Build IPPrint iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      
    - name: Show Xcode version
      run: xcodebuild -version

    - name: Install iOS Simulator Runtime
      run: |
        # Check what runtimes are available
        echo "=== Currently installed runtimes ==="
        xcrun simctl list runtimes || true
        
        # Install iOS 18.2 simulator runtime (matches Xcode 16.2)
        echo "=== Installing iOS 18.2 runtime ==="
        xcodebuild -downloadPlatform iOS
        
        echo "=== Runtimes after install ==="
        xcrun simctl list runtimes

    - name: Create and boot simulator
      id: simulator
      run: |
        # List available device types
        echo "=== Available device types ==="
        xcrun simctl list devicetypes | grep -i "iphone 15" || true
        
        # List available devices
        echo "=== Available devices ==="
        xcrun simctl list devices available | grep -i "iphone" || true
        
        # Try to find existing iPhone 15, or create one
        DEVICE_UDID=$(xcrun simctl list devices available -j | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        for runtime, devices in data['devices'].items():
            if 'iOS' in runtime:
                for d in devices:
                    if d['isAvailable'] and d['name'] == 'iPhone 15':
                        print(d['udid'])
                        sys.exit(0)
        # Not found
        sys.exit(1)
        " 2>/dev/null) || true
        
        if [ -z "$DEVICE_UDID" ]; then
          echo "No iPhone 15 found, creating one..."
          # Get the latest iOS runtime identifier
          RUNTIME=$(xcrun simctl list runtimes -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for r in reversed(data['runtimes']):
              if r['isAvailable'] and 'iOS' in r['name']:
                  print(r['identifier'])
                  sys.exit(0)
          sys.exit(1)
          ")
          echo "Using runtime: $RUNTIME"
          DEVICE_UDID=$(xcrun simctl create "iPhone 15" "com.apple.CoreSimulator.SimDeviceType.iPhone-15" "$RUNTIME")
          echo "Created simulator: $DEVICE_UDID"
        else
          echo "Found existing iPhone 15: $DEVICE_UDID"
        fi
        
        echo "device_udid=$DEVICE_UDID" >> "$GITHUB_OUTPUT"

    - name: Build Release for Simulator
      run: |
        xcodebuild build \
          -project IPPrint.xcodeproj \
          -scheme IPPrint \
          -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.device_udid }}' \
          -configuration Release \
          -derivedDataPath ${{ runner.temp }}/DerivedData \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ENABLE_PREVIEWS=NO \
          -skipPackagePluginValidation

    - name: Build Release for Device (unsigned)
      continue-on-error: true
      id: device_build
      run: |
        xcodebuild build \
          -project IPPrint.xcodeproj \
          -scheme IPPrint \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          -derivedDataPath ${{ runner.temp }}/DerivedDataDevice \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          ENABLE_PREVIEWS=NO \
          -skipPackagePluginValidation

    - name: Package Build Artifacts
      run: |
        mkdir -p ${{ runner.temp }}/export
        
        # 1) Try device build first (real arm64 .app)
        DEVICE_APP=$(find "${{ runner.temp }}/DerivedDataDevice" -path "*/Release-iphoneos/IPPrint.app" -type d 2>/dev/null | head -1)
        if [ -n "$DEVICE_APP" ]; then
          echo "Found device .app: $DEVICE_APP"
          cd "$(dirname "$DEVICE_APP")"
          zip -r "${{ runner.temp }}/export/IPPrint-device-unsigned.zip" IPPrint.app
        else
          echo "No device build .app (expected if signing failed)"
        fi
        
        # 2) Simulator build (always works)
        SIM_APP=$(find "${{ runner.temp }}/DerivedData" -path "*/Release-iphonesimulator/IPPrint.app" -type d 2>/dev/null | head -1)
        if [ -n "$SIM_APP" ]; then
          echo "Found simulator .app: $SIM_APP"
          cd "$(dirname "$SIM_APP")"
          zip -r "${{ runner.temp }}/export/IPPrint-simulator.zip" IPPrint.app
        else
          echo "ERROR: No simulator .app found either"
          find "${{ runner.temp }}/DerivedData" -name "*.app" -type d 2>/dev/null
          exit 1
        fi
        
        echo "=== Build artifacts ==="
        ls -la ${{ runner.temp }}/export/

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: IPPrint-Build
        path: ${{ runner.temp }}/export/
        retention-days: 30
