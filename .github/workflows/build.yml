name: Build IPPrint iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      
    - name: Show Xcode version
      run: xcodebuild -version

    - name: Resolve dependencies
      run: xcodebuild -resolvePackageDependencies -project IPPrint.xcodeproj -scheme IPPrint

    - name: Build for iPhone Simulator
      run: |
        xcodebuild build \
          -project IPPrint.xcodeproj \
          -scheme IPPrint \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Build Archive (unsigned)
      run: |
        xcodebuild archive \
          -project IPPrint.xcodeproj \
          -scheme IPPrint \
          -destination 'generic/platform=iOS' \
          -archivePath ${{ runner.temp }}/IPPrint.xcarchive \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          SKIP_INSTALL=NO

    - name: Export IPA (unsigned)
      run: |
        mkdir -p ${{ runner.temp }}/export
        cat > ${{ runner.temp }}/ExportOptions.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>development</string>
          <key>compileBitcode</key>
          <false/>
          <key>signingStyle</key>
          <string>manual</string>
        </dict>
        </plist>
        EOF
        # For unsigned builds, just zip the .app from archive
        cd "${{ runner.temp }}/IPPrint.xcarchive/Products/Applications"
        zip -r "${{ runner.temp }}/export/IPPrint-unsigned.zip" IPPrint.app

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: IPPrint-Build
        path: ${{ runner.temp }}/export/
        retention-days: 30
