name: Build IPPrint iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      
    - name: Show Xcode & Simulator info
      run: |
        xcodebuild -version
        xcrun simctl list runtimes
        xcrun simctl list devices available | head -40

    - name: Find best available simulator
      id: simulator
      run: |
        # Find an available iPhone 15 simulator, fallback to any iPhone
        DEVICE=$(xcrun simctl list devices available -j | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        fallback = None
        for runtime, devices in data['devices'].items():
            if 'iOS' in runtime:
                for d in devices:
                    name = d['name']
                    if d['isAvailable'] and 'iPhone' in name:
                        if 'iPhone 15' in name and not fallback:
                            fallback = name
                        if name == 'iPhone 15':
                            print(name)
                            sys.exit(0)
        if fallback:
            print(fallback)
        else:
            print('iPhone 15')
        ")
        echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
        echo "Using simulator: $DEVICE"

    - name: Build for iPhone Simulator
      run: |
        xcodebuild build \
          -project IPPrint.xcodeproj \
          -scheme IPPrint \
          -destination 'platform=iOS Simulator,name=${{ steps.simulator.outputs.device }}' \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ENABLE_PREVIEWS=NO \
          -skipPackagePluginValidation

    - name: Build Archive (unsigned)
      run: |
        xcodebuild archive \
          -project IPPrint.xcodeproj \
          -scheme IPPrint \
          -destination 'generic/platform=iOS' \
          -archivePath ${{ runner.temp }}/IPPrint.xcarchive \
          -configuration Release \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ENABLE_PREVIEWS=NO \
          SKIP_INSTALL=NO \
          -skipPackagePluginValidation

    - name: Package Build Artifact
      run: |
        mkdir -p ${{ runner.temp }}/export
        if [ -d "${{ runner.temp }}/IPPrint.xcarchive/Products/Applications/IPPrint.app" ]; then
          cd "${{ runner.temp }}/IPPrint.xcarchive/Products/Applications"
          zip -r "${{ runner.temp }}/export/IPPrint-unsigned.zip" IPPrint.app
        else
          echo "=== Archive structure ==="
          find "${{ runner.temp }}/IPPrint.xcarchive" -type d -maxdepth 4
          echo "=== Looking for .app ==="
          find "${{ runner.temp }}/IPPrint.xcarchive" -name "*.app" 2>/dev/null
        fi

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: IPPrint-Build
        path: |
          ${{ runner.temp }}/export/
          ${{ runner.temp }}/IPPrint.xcarchive/
        retention-days: 30
